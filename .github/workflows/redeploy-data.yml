name: Redeploy on data change

on:
  push:
    branches: [main, master]
    paths:
      - public/quotes.json
      - public/stocks.json
      - public/ohlcv/**
      - public/us-quotes.json
      - public/us-watchlist.json
      - public/us-ohlcv/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: ./.github/actions/build
        with:
          refresh-stocks: 'false'
          refresh-quotes: 'false'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
