name: Refresh US quotes

on:
  schedule:
    - cron: '*/10 14-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-us-quotes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Skip if watchlist empty
        id: watchlist
        run: |
          if [ ! -f public/us-watchlist.json ] || [ "$(python -c "import json; print(len(json.load(open('public/us-watchlist.json'))))")" = "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh us-quotes.json
        if: steps.watchlist.outputs.skip == 'false'
        env:
          PYTHONPATH: scripts
        run: python scripts/fetch_us_quotes.py

      - name: Commit and push
        if: steps.watchlist.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/us-quotes.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh us-quotes.json"
          git push
