name: Refresh stocks.json

on:
  schedule:
    - cron: '0 21 * * 0-4'
  workflow_dispatch:
    inputs:
      auto_commit:
        description: Commit and push if stocks.json changed
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: refresh-stocks
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh stock list (pykrx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-python-data
        with:
          refresh-stocks: 'true'
          refresh-quotes: 'false'

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/stocks.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            STOCK_COUNT=$(python -c "import json; print(len(json.load(open('public/stocks.json'))))")
            echo "stock_count=$STOCK_COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: >-
          steps.diff.outputs.changed == 'true' &&
          (github.event_name == 'schedule' || inputs.auto_commit == true)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/stocks.json
          git commit -m "chore: refresh stocks.json via pykrx (${{ steps.diff.outputs.stock_count }} stocks)"
          git push
