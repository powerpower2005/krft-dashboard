name: Fetch US OHLCV (single symbol)

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: US ticker (e.g. SMH, AAPL)
        required: true
        type: string
      years:
        description: Years of history
        type: number
        default: 10
      auto_commit:
        description: Commit and push generated files
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Generate US ohlcv
        env:
          PYTHONPATH: scripts
        run: python scripts/generate_us_ohlcv.py --symbol "${{ inputs.symbol }}" --years ${{ inputs.years }}

      - name: Refresh US quotes for watchlist
        env:
          PYTHONPATH: scripts
        run: python scripts/fetch_us_quotes.py

      - name: Commit and push
        if: inputs.auto_commit == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/us-ohlcv public/us-watchlist.json public/us-quotes.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: add US ohlcv for ${{ inputs.symbol }}"
          git push
