name: Backfill OHLCV

on:
  workflow_dispatch:
    inputs:
      years:
        description: Years of history per stock
        type: number
        default: 10
      batches:
        description: Parallel batch count
        type: number
        default: 8
      auto_commit:
        description: Commit and push generated ohlcv files
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: backfill-ohlcv
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-data
        with:
          refresh-stocks: 'true'
          refresh-quotes: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: stocks-json
          path: public/stocks.json
          retention-days: 1

  backfill:
    name: Batch ${{ matrix.batch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: stocks-json
          path: public

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Backfill ohlcv batch
        env:
          PYTHONPATH: scripts
        run: |
          python scripts/generate_ohlcv.py \
            --batch ${{ matrix.batch }} \
            --batches ${{ inputs.batches || 8 }} \
            --years ${{ inputs.years || 10 }}

      - uses: actions/upload-artifact@v4
        with:
          name: ohlcv-batch-${{ matrix.batch }}
          path: public/ohlcv/
          retention-days: 1

  merge:
    needs: backfill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: ohlcv-batch-*
          path: artifacts
          merge-multiple: true

      - name: Merge ohlcv artifacts
        run: |
          mkdir -p public/ohlcv
          find artifacts -type f -name '*.json' -exec cp -t public/ohlcv {} +
          echo "Merged $(find public/ohlcv -maxdepth 1 -name '*.json' | wc -l) ohlcv files"

      - name: Commit and push
        if: inputs.auto_commit == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ohlcv
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: backfill ohlcv history via pykrx/FDR"
          git push
