name: Refresh OHLCV (daily)

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ohlcv-daily
  cancel-in-progress: true

jobs:
  refresh:
    name: Append latest close to ohlcv files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Append latest trading day
        env:
          PYTHONPATH: scripts
        run: python scripts/generate_ohlcv.py --append-latest

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ohlcv
          git diff --staged --quiet && echo "No ohlcv changes" && exit 0
          git commit -m "chore: append latest ohlcv via pykrx"
          git push
