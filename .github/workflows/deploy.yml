name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_path:
        description: Vite base path for GitHub Pages
        required: false
        default: /krft-dashboard/
      refresh_stocks:
        description: Refresh stocks.json from KRX before build
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    name: Build for production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build
        with:
          base-path: ${{ github.event_name == 'workflow_dispatch' && inputs.base_path || '/krft-dashboard/' }}
          refresh-stocks: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_stocks == false && 'false' || 'true' }}
          refresh-quotes: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment summary
        run: |
          {
            echo "### Production deploy"
            echo "- URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
