name: Fetch OHLCV (single symbol)

on:
  workflow_dispatch:
    inputs:
      code:
        description: Stock/ETF code (e.g. 456600)
        required: true
        type: string
      years:
        description: Years of history
        type: number
        default: 10
      auto_commit:
        description: Commit and push ohlcv file
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Generate ohlcv for symbol
        env:
          PYTHONPATH: scripts
        run: python scripts/generate_ohlcv.py --code "${{ inputs.code }}" --years ${{ inputs.years }}

      - name: Commit and push
        if: inputs.auto_commit == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "public/ohlcv/${{ inputs.code }}.json"
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: add ohlcv for ${{ inputs.code }}"
          git push
