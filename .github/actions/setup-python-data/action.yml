name: Setup Python market data
description: Install Python deps and refresh stocks.json / quotes.json via pykrx.

inputs:
  refresh-stocks:
    required: false
    default: 'true'
  refresh-quotes:
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Install Python dependencies
      shell: bash
      run: pip install -r requirements.txt

    - name: Generate stocks.json (pykrx)
      if: inputs.refresh-stocks == 'true'
      shell: bash
      env:
        PYTHONPATH: scripts
      run: python scripts/generate_stocks.py

    - name: Fetch quotes.json (pykrx)
      if: inputs.refresh-quotes == 'true'
      shell: bash
      env:
        PYTHONPATH: scripts
      run: python scripts/fetch_quotes.py
